name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build python3-pip

      - name: Setup build
        run: meson setup builddir -Dmock_mode=true

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir
